# Cloudflare Pages Configuration for Narendhar D Portfolio

name = "narendhar-portfolio"
type = "javascript"
compatibility_date = "2024-12-19"

# Build configuration
[build]
command = "npm install && npm run build"
cwd = "./"
watch_paths = ["src/**/*.tsx", "src/**/*.ts", "src/**/*.css"]

# Routes and environment variables
[env.production]
route = "narendhar-portfolio.pages.dev/*"
